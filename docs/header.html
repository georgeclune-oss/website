<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Montserrat, sans-serif;
    background: #ECF2FF;
}

/* Make ONLY h1 + h2 dark blue */
h1, h2, h3 {
    color: #002F61;
    font-weight: 700;
}

/* HEADER BAR */
.header-container {
    background: #002F61;
    color: white;
    padding: 20px 30px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-wrap: wrap;
    text-align: center;
}

.site-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.5px;
}

/* SEARCH BAR */
.search-container {
    display: flex;
    align-items: center;
}

.search-input {
    width: 180px;
    padding: 8px 12px;
    border-radius: 20px;
    border: none;
    outline: none;
    font-size: 16px;
    font-family: Montserrat, sans-serif;
    transition: width 0.3s ease;
}

.search-input:focus {
    width: 260px;
}

nav {
    width: 100%;
    background: #003A75;
    color: white;
    padding: 20px 30px;
    display: flex;
    justify-content: space-between; /* same logic as header */
    align-items: center;
    box-sizing: border-box;
}

.nav-left,
.nav-right {
    flex: 1; /* BOTH sides fill the width */
}

.nav-right {
    display: flex;
    justify-content: flex-end; /* nav links stay on the right */
    gap: 25px;
}










nav a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    font-weight: 600;
    transition: 0.2s;
}

nav a:hover {
    opacity: 0.7;
}

/* MOBILE */
@media (max-width: 700px) {

    .header-container {
        flex-direction: row; /* keep title + search bar side-by-side */
        justify-content: space-between; /* title left, search right */
        align-items: center;
        padding: 15px 20px;
        gap: 10px;
        text-align: left;
    }

    .search-input {
        width: 140px; /* fits on mobile */
        max-width: 200px;
    }

    nav {
        justify-content: flex-end; /* keep nav under search bar */
        padding: 12px 40px; /* reduce huge padding */
    }
}

</style>

<div class="header-container">
    <a href="index.html" class="site-title" style="text-decoration:none; color:white;">
    ÉIRELYTICS
</a>



    <div class="search-container">
        <input 
            type="text" 
            id="searchInput" 
            class="search-input" 
            placeholder="Search..."
            onkeydown="if(event.key === 'Enter') performSearch()"
        >
    </div>
</div>

<nav>
    <div class="nav-left"></div> <!-- empty -->
    <div class="nav-right">
        <a href="index.html">Home</a>
        <a href="data-licensing.html">Data Licensing</a>
    </div>
</nav>




<script>
function performSearch() {
    const query = document.getElementById("searchInput").value.trim();
    if (query.length > 0) {
        window.location.href = `https://www.bing.com/search?q=site:georgeclune-oss.github.io/website+${encodeURIComponent(query)}`;
    }
}
</script>
