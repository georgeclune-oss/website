<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<header>
    <div class="header-inner">

        <div class="site-title">
            <a href="index.html" style="text-decoration:none; color:white;">ÉIRELYTICS</a>
        </div>

       <nav>
    <a href="data-licensing.html" class="nav-link">Data Licensing</a>

    <div class="search-container">
        <input type="text" placeholder="Search..." class="search-input"
               onkeydown="if(event.key === 'Enter'){ handleSearch(); }">
    </div>
</nav>


    </div>
</header>

<style>
    /* GLOBAL HEADING COLORS */
h1, h2, h3, h4, h5, h6 {
    color: #002F61;   /* your Éirelytics blue */
    font-weight: 700;
}

    /* GLOBAL PAGE STYLING — applies to all pages */
.page-wrapper, .content-wrapper {
    max-width: 900px;
     margin: 20px auto 40px auto;
    padding: 20px;
}

/* Main page titles */
h1 {
    font-size: 36px;
    font-weight: 700;
    color: #002F61;
    margin-bottom: 20px;
     margin-top: 10px
}

/* Section titles */
h2, .section-title {
    font-size: 24px;
    font-weight: 600;
    color: #003A75;
    margin-bottom: 10px;
}

/* Paragraph text */
p, li {
    font-size: 18px;
    line-height: 1.6;
    color: #333;
}

    .nav-link {
    margin-right: 20px;
    font-size: 18px;
    font-weight: 600;
    color: white;
    text-decoration: none;
}

.nav-link:hover {
    text-decoration: underline;
}

    body {
    background: #EBF8FF; /* ← same background as your index page */
    margin: 0;
    padding: 0;
}

    header {
        background: #002F61;
        padding: 20px 0;
        color: white;
        font-family: Montserrat, sans-serif;
    }

    .header-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-left: 140px;
        padding-right: 140px;
    }

    .site-title {
        font-size: 36px;
        font-weight: 700;
        margin: 0;
    }

    nav {
    display: flex;
    align-items: center;
    background: transparent; 
}


    .search-container {
        display: flex;
        align-items: center;
        background: transparent;

    }

   
    .search-input {
    width: 220px;
    padding: 10px 14px;
    border-radius: 25px; 
    border: 2px solid #ccc;
    background: white; 
    color: black;
    transition: width 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
}

.search-input::placeholder {
    color: #888;
}

.search-input:focus {
    width: 280px; 
    border-color: #007BFF;
    box-shadow: 0 0 6px rgba(0, 123, 255, 0.6);
    outline: none;
}

</style>

<script>
function handleSearch() {
    const query = document.querySelector('.search-input').value.trim();
    if (query !== "") {
        window.location.href = `search.html?q=${encodeURIComponent(query)}`;
    }
}
</script>
