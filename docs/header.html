<!-- Load Biome font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
header {
    background: #002F61;
    color: white;
    padding: 20px;
    width: 100%;
    box-sizing: border-box;
}

.header-left {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
}

.site-title {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 0;
    font-family: "Poppins", sans-serif;
    letter-spacing: 3px;
    font-stretch: 125%;
}

nav {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    background: #6195BF;
    padding: 10px;
    max-width: 100%;
    box-sizing: border-box;
}

nav a {
    color: white;
    text-decoration: none;
    font-size: 18px;
}

nav a:hover {
    text-decoration: underline;
}

/* ✅ Correct search bar styling */
.search-container {
    display: flex;
    align-items: center;
    margin-left: 20px;
}

.search-container input {
    padding: 6px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
}

.search-container button {
    margin-left: 6px;
    padding: 6px 10px;
    background: #0078ff;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.search-container button:hover {
    background: #005fcc;
}


</style>

<header>
    <div class="header-left">
        <div class="site-title">ÉIRELYTICS</div>
        <nav>
            <a href="index.html">Maps</a>
            <div class="search-container">
    <input type="text" id="site-search" placeholder="Search...">
    <button onclick="performSearch()">🔍</button>
</div>

        </nav>
    </div>
</header>
<script>
function performSearch() {
    const query = document.getElementById("site-search").value.trim();
    if (query.length === 0) return;

    // Redirect to Bing search for your site
    window.location.href = `https://www.bing.com/search?q=site%3Ageorgeclune-oss.github.io+${encodeURIComponent(query)}`;
}
</script>
