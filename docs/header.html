<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<header>
    <div class="header-inner">

        <div class="site-title">
            <a href="index.html" style="text-decoration:none; color:white;">ÉIRELYTICS</a>
        </div>

        <nav>
            <div class="search-container">
                <input type="text" placeholder="Search..." class="search-input"
                       onkeydown="if(event.key === 'Enter'){ handleSearch(); }">
            </div>
        </nav>

    </div>
</header>

<style>
    header {
        background: #002F61;
        padding: 20px 0;
        color: white;
        font-family: Montserrat, sans-serif;
    }

    .header-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-left: 140px;
        padding-right: 140px;
    }

    .site-title {
        font-size: 36px;
        font-weight: 700;
        margin: 0;
    }

    nav {
        display: flex;
        align-items: center;
    }

    .search-container {
        display: flex;
        align-items: center;
    }

    /* ✅ ORIGINAL ROUNDED STYLE + MATCHING HEADER BACKGROUND */
    .search-input {
        width: 200px;
        padding: 10px 14px;
        border-radius: 25px; /* ← fully rounded */
        border: none;
        background: #003A75; /* ← darker shade matching header */
        color: white;
        transition: width 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
    }

    .search-input::placeholder {
        color: #d0d8e0;
    }

    /* ✅ EXPANDS LIKE ORIGINAL */
    .search-input:focus {
        width: 260px;
        background: #004A95; /* slightly brighter on focus */
        box-shadow: 0 0 8px rgba(0, 123, 255, 0.5);
        outline: none;
    }
</style>

<script>
function handleSearch() {
    const query = document.querySelector('.search-input').value.trim();
    if (query !== "") {
        window.location.href = `search.html?q=${encodeURIComponent(query)}`;
    }
}
</script>
