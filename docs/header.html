<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: Montserrat, sans-serif;
        background: #ECF2FF; /* Light blue site background */
        color: black; /* Data Licensing text color */
    }

    /* GLOBAL TITLE COLORS */
    h1, h2, {
        color: #002F61; /* Data Licensing heading color */
        font-weight: 700;

    }

    /* HEADER BAR */
    .header-container {
        background: #002F61;
        color: white;
        padding: 20px 30px; /* <-- pulls both items closer to edges */
        display: flex;
        align-items: center;
        justify-content: space-around; /* <-- perfect midpoint */
        flex-wrap: wrap;
        text-align: center;
    }

    .site-title {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    /* SEARCH BAR */
    .search-container {
        display: flex;
        align-items: center;
    }

    .search-input {
        width: 180px;
        padding: 8px 12px;
        border-radius: 20px;
        border: none;
        outline: none;
        font-size: 16px;
        font-family: Montserrat, sans-serif;
        transition: width 0.3s ease;
    }

    .search-input:focus {
        width: 260px;
    }

    /* NAVIGATION */
   nav {
    background: #003A75;
    padding: 12px 140px; /* <-- increased padding pulls nav inward */
    display: flex;
    justify-content: flex-end; /* <-- right side but not extreme */
    gap: 25px;
    flex-wrap: wrap;
}


    nav a {
        color: white;
        text-decoration: none;
        font-size: 18px;
        font-weight: 600;
        transition: 0.2s;
    }

    nav a:hover {
        opacity: 0.7;
    }

    /* MOBILE */
    @media (max-width: 700px) {

        .header-container {
            flex-direction: column;
            gap: 12px;
            padding: 15px;
        }

        .search-input {
            width: 70%;
            max-width: 260px;
        }
    }
</style>

<div class="header-container">
    <div class="site-title">ÉIRELYTICS</div>

    <div class="search-container">
        <input 
            type="text" 
            id="searchInput" 
            class="search-input" 
            placeholder="Search..."
            onkeydown="if(event.key === 'Enter') performSearch()"
        >
    </div>
</div>

<nav>
    <a href="index.html">Home</a>
    <a href="data-licensing.html">Data Licensing</a>
</nav>

<script>
function performSearch() {
    const query = document.getElementById("searchInput").value.trim();
    if (query.length > 0) {
        window.location.href = `https://www.bing.com/search?q=site:georgeclune-oss.github.io/website+${encodeURIComponent(query)}`;
    }
}
</script>
