<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<header>
    <div class="header-inner">

        <div class="site-title">
            <a href="index.html" style="text-decoration:none; color:white;">ÉIRELYTICS</a>
        </div>

        <nav>
            <div class="search-container">
                <input type="text" placeholder="Search..." class="search-input"
                       onkeydown="if(event.key === 'Enter'){ handleSearch(); }">
            </div>
        </nav>

    </div>
</header>

<style>
    body {
    background: #EBF8FF; /* ← same background as your index page */
    margin: 0;
    padding: 0;
}

    header {
        background: #002F61;
        padding: 20px 0;
        color: white;
        font-family: Montserrat, sans-serif;
    }

    .header-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-left: 140px;
        padding-right: 140px;
    }

    .site-title {
        font-size: 36px;
        font-weight: 700;
        margin: 0;
    }

    nav {
    display: flex;
    align-items: center;
    background: transparent; 
}


    .search-container {
        display: flex;
        align-items: center;
        background: transparent;

    }

   
    .search-input {
    width: 220px;
    padding: 10px 14px;
    border-radius: 25px; 
    border: 2px solid #ccc;
    background: white; 
    color: black;
    transition: width 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
}

.search-input::placeholder {
    color: #888;
}

.search-input:focus {
    width: 280px; 
    border-color: #007BFF;
    box-shadow: 0 0 6px rgba(0, 123, 255, 0.6);
    outline: none;
}

</style>

<script>
function handleSearch() {
    const query = document.querySelector('.search-input').value.trim();
    if (query !== "") {
        window.location.href = `search.html?q=${encodeURIComponent(query)}`;
    }
}
</script>
