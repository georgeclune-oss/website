<style>
    body {
    background: #EBF8FF; /* or any colour you want */
    margin: 0;
    padding: 0;
}

header {
    background: #002F61;
    color: white;
    padding: 20px;
    width: 100%;
    box-sizing: border-box;
}

.header-left {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
}

.site-title {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 0;
    font-family: "Montserrat", sans-serif;
    letter-spacing: 3px;
    font-stretch: 125%;
    padding-left: 200px;
}
header, nav, .site-title {
    font-family: "Montserrat", sans-serif;
}
nav {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 10px 0;
    background: transparent !important;
    box-shadow: none !important;
    border: none !important;
}


nav a {
    color: white;
    text-decoration: none;
    font-size: 18px;
}

nav a:hover {
    text-decoration: underline;
}


.search-container {
    display: flex;
    align-items: center;
    margin-left: 20px;
}

.search-container {
    display: flex;
    align-items: center;
    margin-left: 20px;
}

.search-container input {
    padding: 8px 14px;
    width: 220px;
    border-radius: 20px;
    font-size: 15px;
    transition: 0.25s ease;
    outline: none;

    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    color: white;
}

    
    border-radius: 20px;
    font-size: 15px;
    transition: 0.25s ease;
    outline: none;
    
}

.search-container input:focus {
    width: 280px;
    
}



</style>

<header>
    <div class="header-left">

</div>

    </div>
</header>
