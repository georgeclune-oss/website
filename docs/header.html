<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: Montserrat, sans-serif;
    }

    /* HEADER BAR */
    .header-container {
        background: #002F61;
        color: white;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .site-title {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    /* NAVIGATION */
    nav {
        background: #003A75;
        padding: 12px 20px;
        display: flex;
        gap: 25px;
    }

    nav a {
        color: white;
        text-decoration: none;
        font-size: 18px;
        font-weight: 600;
        transition: 0.2s;
    }

    nav a:hover {
        opacity: 0.7;
    }

    /* SEARCH BAR */
    .search-container {
        position: relative;
        display: flex;
        align-items: center;
    }

    .search-input {
        width: 180px;
        padding: 8px 12px;
        border-radius: 20px;
        border: none;
        outline: none;
        font-size: 16px;
        font-family: Montserrat, sans-serif;
        transition: width 0.3s ease;
    }

    .search-input:focus {
        width: 260px;
    }
</style>

<div class="header-container">
    <div class="site-title">ÉIRELYTICS</div>

    <div class="search-container">
        <input 
            type="text" 
            id="searchInput" 
            class="search-input" 
            placeholder="Search..."
            onkeydown="if(event.key === 'Enter') performSearch()"
        >
    </div>
</div>

<nav>
    <a href="index.html">Home</a>
    <a href="ireland-churches.html">Churches</a>
    <a href="spaceports-map.html">Spaceports</a>
    <a href="data-licensing.html">Data Licensing</a>
</nav>

<script>
function performSearch() {
    const query = document.getElementById("searchInput").value.trim();
    if (query.length > 0) {
        window.location.href = `https://www.bing.com/search?q=site:georgeclune-oss.github.io/website+${encodeURIComponent(query)}`;
    }
}
</script>
