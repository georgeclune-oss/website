<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<header>
    <div class="header-inner">

        <div class="site-title">
            <a href="index.html" style="text-decoration:none; color:white;">ÉIRELYTICS</a>
        </div>

       <nav>
    <a href="data-licensing.html" class="nav-link">Data Licensing</a>

    <div class="search-container">
        <input type="text" placeholder="Search..." class="search-input"
               onkeydown="if(event.key === 'Enter'){ handleSearch(); }">
    </div>
</nav>


    </div>
</header>

<style>
    /* GLOBAL HEADING COLORS */
h1, h2, h3, h4, h5, h6 {
    color: #105E3F;
    font-weight: 700;
}

    /* GLOBAL PAGE STYLING — applies to all pages */
.page-wrapper, .content-wrapper {
    max-width: 900px;
     margin: 20px auto 40px auto;
    padding: 20px;
}

/* Main page titles */
h1 {
    font-size: 36px;
    font-weight: 700;
    color: #105E3F; 
    margin-bottom: 20px;
     margin-top: 10px
}

/* Section titles */
h2, .section-title {
    font-size: 24px;
    font-weight: 600;
    color: #105E3F; 
    margin-bottom: 10px;
}

/* Paragraph text */
p, li {
    font-size: 18px;
    line-height: 1.6;
    color: #333;
}

    .nav-link {
    margin-right: 20px;
    font-size: 18px;
    font-weight: 600;
    color: white;
    text-decoration: none;
}

.nav-link:hover {
    text-decoration: underline;
}

    body {
    background: #DCFFEF;  /* ← same background as your index page */
    margin: 0;
    padding: 0;
}
@media (max-width: 600px) {

    header {
        background: #105E3F;
        padding: 15px;
        color: white;
        font-family: Montserrat, sans-serif;
    }

    .header-inner {
        display: flex;
        flex-direction: column;   /* stack vertically */
        align-items: flex-start;  /* align left */
        gap: 12px;
        padding: 0;               /* remove huge padding */
    }

    .site-title {
        font-size: 28px;
        margin: 0;
    }

    nav {
        display: flex;
        flex-direction: row;
        gap: 15px;
        flex-wrap: wrap;          /* allow wrapping */
        width: 100%;
    }

    .nav-link {
        font-size: 16px;
        margin-right: 10px;
    }

    .search-container {
        width: 100%;
    }

    .search-input {
        width: 100%;
        padding: 10px 14px;
        border-radius: 25px;
        border: 2px solid #ccc;
        background: white;
        color: black;
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .search-input:focus {
        border-color: #007BFF;
        box-shadow: 0 0 6px rgba(0, 123, 255, 0.6);
        outline: none;
    }
}


</style>

<script>
function handleSearch() {
    const query = document.querySelector('.search-input').value.trim();
    if (query !== "") {
        window.location.href = `search.html?q=${encodeURIComponent(query)}`;
    }
}
</script>
