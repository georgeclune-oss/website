<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Churches in Ireland</title>


    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #1a1a1a;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        nav {
            background: #333;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        .content {
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
        }

        .map-container {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            height: 700px;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div id="header"></div>

<script>
fetch("header.html")
  .then(response => response.text())
  .then(data => {
      document.getElementById("header").innerHTML = data;
  });
</script>



<div class="content">
    <h2>All Churches in Ireland</h2>
    <div style="background:white;padding:15px;border-radius:10px;margin-bottom:20px;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);">
    <b>Map Details</b><br>
    There are 5,345 church buildings in Ireland. This map contains all churches on the Island of Ireland accross multiple Christian denominations. Using Catholic diocese borders.
</div>

    <div class="map-container">
        <iframe src="https://georgeclune-oss.github.io/church/qgis2web_2026_05_07-17_51_19_663315/"></iframe>
    </div>
</div>
<div style="display:flex;gap:20px;margin-bottom:20px;">
    <div style="flex:1;background:white;padding:15px;border-radius:10px;
                box-shadow:0 2px 6px rgba(0,0,0,0.1);">
        <b>Total Churches:</b> 5,345
    </div>
    <div style="flex:1;background:white;padding:15px;border-radius:10px;
                box-shadow:0 2px 6px rgba(0,0,0,0.1);">
        <b>Counties Covered:</b> 32
    </div>
    <div style="flex:1;background:white;padding:15px;border-radius:10px;
                box-shadow:0 2px 6px rgba(0,0,0,0.1);">
        <b>Diocese Covered:</b> 26
    </div>
    <div style="flex:1;background:white;padding:15px;border-radius:10px;
                box-shadow:0 2px 6px rgba(0,0,0,0.1);">
        <b>Last Updated:</b> May 2026
    </div>
</div>

</body>
</html>
